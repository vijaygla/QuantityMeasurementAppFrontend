<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement System</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/index.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="app-wrapper">
        <!-- HEADER -->
        <header class="header">
            <div class="logo-container">
                <span class="icon">📏</span>
                <h1>Quantity Measurement</h1>
            </div>
            <p class="tagline">Compare • Convert • Calculate with precision</p>
        </header>

        <!-- MAIN CONTAINER -->
        <main class="container">

            <!-- TYPE SELECTION -->
            <section class="card glass">
                <h2>Select Measurement Type</h2>
                <div class="options type-options">
                    <button class="type-btn active" data-type="length">📐 Length</button>
                    <button class="type-btn" data-type="weight">⚖ Weight</button>
                    <button class="type-btn" data-type="temperature">🌡 Temperature</button>
                    <button class="type-btn" data-type="volume">🧪 Volume</button>
                </div>
            </section>

            <!-- ACTION SELECTION -->
            <section class="card glass">
                <h2>Select Action</h2>
                <div class="options action-options">
                    <button class="action-btn active" data-action="comparison">Compare</button>
                    <button class="action-btn" data-action="conversion">Convert</button>
                    <button class="action-btn" data-action="arithmetic">Add</button>
                </div>
            </section>

            <!-- INPUT SECTION -->
            <section class="card glass input-card">
                <div class="card-header">
                    <h2>Enter Values</h2>
                    <button id="swapBtn" title="Swap Units" class="icon-btn">🔄</button>
                </div>

                <div class="input-grid">
                    <div class="input-group">
                        <label for="value1">Value 1</label>
                        <div class="input-wrapper">
                            <input type="number" id="value1" placeholder="0.00" step="any">
                            <select id="unit1"></select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="value2">Value 2</label>
                        <div class="input-wrapper">
                            <input type="number" id="value2" placeholder="0.00" step="any">
                            <select id="unit2"></select>
                        </div>
                    </div>
                </div>

                <button id="calculateBtn" class="primary-btn">⚡ Calculate Result</button>

                <div class="result-box">
                    <div id="result-label">Output</div>
                    <div id="result">Waiting for input...</div>
                </div>
            </section>

        </main>

        <!-- FOOTER -->
        <footer class="footer">
            <p>© 2026 Quantity Measurement System • Built for Precision</p>
        </footer>
    </div>

    <!-- JS -->
    <script src="../js/index.js"></script>

</body>

</html>
